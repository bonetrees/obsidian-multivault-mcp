name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN: CI only reads source.
permissions:
  contents: read

# Opt in to Node.js 24 for JavaScript actions ahead of the June 2026
# default switch — actions/checkout@v4, setup-python@v5, cache@v4 still
# ship Node 20 binaries today. Drop this once those actions publish
# Node 24 builds natively.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs for supply-chain hardening; version tag
      # in trailing comment for human readability. Bump SHA + comment together.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a  # v1.4.1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest tests/

      - name: Check formatting
        run: poetry run black --check src/ tests/

      - name: Lint
        run: poetry run pylint src/obsidian_multivault_mcp/
